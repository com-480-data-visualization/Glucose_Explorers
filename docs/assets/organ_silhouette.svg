<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" id="organ-svg">
  <!-- Simple stylized human silhouette with organ shapes as separate elements -->
  <g id="silhouette" fill="#e9eef2">
    <circle cx="150" cy="60" r="40" />
    <rect x="80" y="100" width="140" height="340" rx="30" />
    <rect x="50" y="260" width="40" height="120" rx="20" />
    <rect x="210" y="260" width="40" height="120" rx="20" />
  </g>

  <!-- Organs -->
  <g id="organs">
    <path id="brain" data-name="Brain" d="M110 20 C120 5,180 5,190 20 C200 35,170 55,150 55 C130 55,100 35,110 20 Z" fill="#dfe7ff" stroke="#c0d0ff"/>
    <ellipse id="heart" data-name="Heart" cx="150" cy="210" rx="30" ry="24" fill="#ffb3b3" stroke="#ff8a8a"/>
    <rect id="liver" data-name="Liver" x="90" y="250" width="120" height="40" rx="10" fill="#d2b48c" stroke="#c09b73"/>
    <ellipse id="pancreas" data-name="Pancreas" cx="150" cy="300" rx="24" ry="12" fill="#fff2a8" stroke="#ffe066"/>
    <g id="kidneys" data-name="Kidneys" fill="#c8b3ff" stroke="#ac97ff">
      <ellipse cx="110" cy="330" rx="16" ry="10"/>
      <ellipse cx="190" cy="330" rx="16" ry="10"/>
    </g>
    <rect id="adipose" data-name="Adipose" x="110" y="360" width="80" height="30" rx="8" fill="#ffd6a5" stroke="#ffbc80"/>
  </g>

  <!-- Invisible hit boxes slightly larger for easier hover -->
  <g id="hitboxes" fill="transparent">
    <path id="hit-brain" d="M100 10 C120 -5,180 -5,200 10 L200 70 L100 70 Z" />
    <ellipse id="hit-heart" cx="150" cy="210" rx="40" ry="34" />
    <rect id="hit-liver" x="80" y="240" width="140" height="60" rx="12" />
    <ellipse id="hit-pancreas" cx="150" cy="300" rx="34" ry="20" />
    <g id="hit-kidneys">
      <ellipse cx="110" cy="330" rx="24" ry="16"/>
      <ellipse cx="190" cy="330" rx="24" ry="16"/>
    </g>
    <rect id="hit-adipose" x="100" y="350" width="100" height="50" rx="12" />
  </g>
</svg>
